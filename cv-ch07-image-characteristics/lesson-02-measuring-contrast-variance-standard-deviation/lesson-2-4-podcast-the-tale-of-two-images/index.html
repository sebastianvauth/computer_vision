    padding: 28px;

    background: rgba(255, 255, 255, 0.92);

    <script src="logger.js?v=705ea6e"></script>
    <script src="init.js?v=20260312-root-progress"></script>

<script>
function supportsFullscreen() {
    return !!(document.fullscreenEnabled || document.webkitFullscreenEnabled);
}

function getFullscreenElement() {
    return document.fullscreenElement || document.webkitFullscreenElement || null;
}

function updateFullscreenButtonState() {
    const button = document.getElementById('fullscreenToggleBtn');
    if (!button) return;
    const isFullscreen = !!getFullscreenElement();
    const label = isFullscreen ? 'Exit fullscreen' : 'Enter fullscreen';
    button.setAttribute('aria-label', label);
    button.setAttribute('title', label);
}

async function toggleFullscreenMode() {
    const button = document.getElementById('fullscreenToggleBtn');
    if (!button) return;
    if (!supportsFullscreen()) {
        button.disabled = true;
        console.warn('Fullscreen API is not available. Ensure Moodle LTI iframe allows fullscreen.');
        return;
    }
    try {
        if (!getFullscreenElement()) {
            const root = document.documentElement;
            if (root.requestFullscreen) {
                await root.requestFullscreen();
            } else if (root.webkitRequestFullscreen) {
                root.webkitRequestFullscreen();
            }
        } else if (document.exitFullscreen) {
            await document.exitFullscreen();
        } else if (document.webkitExitFullscreen) {
            document.webkitExitFullscreen();
        }
    } catch (error) {
        console.error('Fullscreen request failed:', error);
    } finally {
        updateFullscreenButtonState();
    }
}

document.addEventListener('fullscreenchange', updateFullscreenButtonState);
document.addEventListener('webkitfullscreenchange', updateFullscreenButtonState);
updateFullscreenButtonState();
</script>
</body>
