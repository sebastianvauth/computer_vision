<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coding: Simulating Light Reflection</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

/* Header */
.header {
    display: flex;
    align-items: center;
    padding: 8px 16px;
    background: #fff;
    border-bottom: 1px solid #e2e8f0;
    height: 48px;
    gap: 12px;
}
.header h1 {
    font-size: 1rem;
    font-weight: 600;
    color: #2d3748;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
}
.jupyter-toggle-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    font-size: 0.875rem;
    font-weight: 500;
    color: #4a5568;
    background: #f7fafc;
    border: 1px solid #cbd5e0;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s ease;
    flex-shrink: 0;
}
.jupyter-toggle-btn:hover { background: #edf2f7; color: #2d3748; }
.toggle-icon { font-size: 0.75rem; }

/* Split pane container */
.split-pane {
    display: flex;
    flex-direction: row;
    height: calc(100vh - 48px);
}

/* Left pane: lesson content */
.lesson-pane {
    flex: 0 0 55%;
    overflow: hidden;
    border-right: 2px solid #e2e8f0;
    background: #fff;
}
.lesson-pane iframe {
    width: 100%;
    height: 100%;
    border: none;
}

/* Resizable divider */
.pane-divider {
    width: 6px;
    cursor: col-resize;
    background: #e2e8f0;
    transition: background 0.2s ease;
    flex-shrink: 0;
}
.pane-divider:hover, .pane-divider.dragging { background: #4facfe; }

/* Right pane: JupyterLite */
.jupyter-pane {
    flex: 1;
    overflow: hidden;
    background: #f8f9fa;
}
.jupyter-pane iframe {
    width: 100%;
    height: 100%;
    border: none;
}

/* Collapsed state */
.split-pane.jupyter-collapsed .lesson-pane { flex: 1; border-right: none; }
.split-pane.jupyter-collapsed .pane-divider { display: none; }
.split-pane.jupyter-collapsed .jupyter-pane { display: none; }

/* Loading indicator */
.loading-indicator {
    padding: 20px;
    text-align: center;
    color: #718096;
    font-size: 0.95rem;
}

/* Responsive: stack vertically on small screens */
@media (max-width: 1024px) {
    .split-pane { flex-direction: column; }
    .lesson-pane { flex: 0 0 50%; border-right: none; border-bottom: 2px solid #e2e8f0; }
    .pane-divider { width: 100%; height: 6px; cursor: row-resize; }
    .jupyter-pane { flex: 1; }
    .jupyter-toggle-btn .toggle-text { display: none; }
    .toggle-icon { transform: rotate(90deg); }
    .split-pane.jupyter-collapsed .jupyter-toggle-btn .toggle-icon { transform: rotate(-90deg); }
}
</style>
</head>
<body>

<div class="header">
    <h1>Coding: Simulating Light Reflection</h1>
    <button class="jupyter-toggle-btn" id="jupyter-toggle-btn" onclick="toggleJupyter()">
        <span class="toggle-icon" id="toggle-icon">&#9664;</span>
        <span class="toggle-text" id="toggle-text">Hide Python</span>
    </button>
</div>

<div class="split-pane" id="split-pane">
    <!-- Left: Lesson content -->
    <div class="lesson-pane" id="lesson-pane">
        <iframe id="lesson-iframe" src="lesson.html" title="Lesson content"></iframe>
    </div>

    <!-- Divider -->
    <div class="pane-divider" id="pane-divider"></div>

    <!-- Right: JupyterLite REPL -->
    <div class="jupyter-pane" id="jupyter-pane">
        <p class="loading-indicator" id="jupyter-loading">Loading Python environment...</p>
    </div>
</div>

<script>
// Toggle Jupyter pane
function toggleJupyter() {
    const container = document.getElementById('split-pane');
    const icon = document.getElementById('toggle-icon');
    const text = document.getElementById('toggle-text');
    const isCollapsed = container.classList.toggle('jupyter-collapsed');
    if (isCollapsed) {
        icon.innerHTML = '&#9654;';
        text.textContent = 'Show Python';
    } else {
        icon.innerHTML = '&#9664;';
        text.textContent = 'Hide Python';
    }
}

// Load JupyterLite
(function() {
    const jupyterPane = document.getElementById('jupyter-pane');
    const sessionId = Date.now();
    const jupyterUrl = 'https://jupyterlite.github.io/demo/repl/index.html?kernel=python&toolbar=1&_session=' + sessionId;

    const iframe = document.createElement('iframe');
    iframe.id = 'jupyter-iframe';
    iframe.title = 'JupyterLite Python REPL';
    iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-popups allow-forms allow-downloads allow-modals');
    iframe.setAttribute('allow', 'clipboard-read; clipboard-write');
    iframe.style.border = 'none';

    iframe.onload = function() {
        var loading = document.getElementById('jupyter-loading');
        if (loading) loading.remove();
    };
    iframe.onerror = function() {
        jupyterPane.innerHTML = '<div style="padding:20px;text-align:center;color:#666;"><p>Could not load JupyterLite.</p><p style="font-size:0.9em;margin-top:10px;"><a href="' + jupyterUrl + '" target="_blank" rel="noopener">Open JupyterLite in new tab</a></p></div>';
    };

    jupyterPane.appendChild(iframe);
    iframe.src = jupyterUrl;
})();

// Resizable divider
(function() {
    const divider = document.getElementById('pane-divider');
    const container = document.getElementById('split-pane');
    const leftPane = document.getElementById('lesson-pane');
    const rightPane = document.getElementById('jupyter-pane');
    let isDragging = false, startX = 0, startWidth = 0;

    function startDrag(e) {
        isDragging = true;
        startX = e.clientX || (e.touches && e.touches[0].clientX);
        startWidth = leftPane.offsetWidth;
        divider.classList.add('dragging');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
        leftPane.style.pointerEvents = 'none';
        rightPane.style.pointerEvents = 'none';
    }
    function doDrag(e) {
        if (!isDragging) return;
        var currentX = e.clientX || (e.touches && e.touches[0].clientX);
        var delta = currentX - startX;
        var cw = container.offsetWidth;
        var nw = Math.max(cw * 0.25, Math.min(cw * 0.75, startWidth + delta));
        leftPane.style.flex = '0 0 ' + ((nw / cw) * 100) + '%';
    }
    function stopDrag() {
        if (!isDragging) return;
        isDragging = false;
        divider.classList.remove('dragging');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
        leftPane.style.pointerEvents = '';
        rightPane.style.pointerEvents = '';
    }

    divider.addEventListener('mousedown', startDrag);
    document.addEventListener('mousemove', doDrag);
    document.addEventListener('mouseup', stopDrag);
    divider.addEventListener('touchstart', startDrag, { passive: true });
    document.addEventListener('touchmove', doDrag, { passive: true });
    document.addEventListener('touchend', stopDrag);
})();

// Inject copy buttons into lesson iframe code blocks
document.getElementById('lesson-iframe').addEventListener('load', function() {
    try {
        var cd = this.contentDocument;
        if (!cd) return;

        var style = cd.createElement('style');
        style.textContent = '.code-block{position:relative}.copy-code-btn{position:absolute;top:8px;right:50px;padding:4px 10px;font-size:.75rem;background:rgba(255,255,255,.1);color:#a0aec0;border:1px solid rgba(255,255,255,.2);border-radius:4px;cursor:pointer;transition:all .2s;z-index:10}.copy-code-btn:hover{background:rgba(255,255,255,.2);color:#fff}.copy-code-btn.copied{background:#48bb78;color:#fff;border-color:#48bb78}';
        cd.head.appendChild(style);

        var blocks = cd.querySelectorAll('.code-block');
        blocks.forEach(function(block) {
            var btn = cd.createElement('button');
            btn.className = 'copy-code-btn';
            btn.textContent = 'Copy';
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                var pre = block.querySelector('pre');
                if (!pre) return;
                var code = pre.textContent || pre.innerText;
                navigator.clipboard.writeText(code).then(function() {
                    btn.textContent = 'Copied!';
                    btn.classList.add('copied');
                    setTimeout(function() { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
                });
            });
            block.appendChild(btn);
        });
    } catch(e) {}
});
</script>
</body>
</html>
